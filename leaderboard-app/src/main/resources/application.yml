spring:
  application:
    name: leaderboard-app
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:leaderboard}
    username: ${POSTGRES_USER:leaderboard}
    password: ${POSTGRES_PASSWORD:leaderboard}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.batch_size: 25
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      cluster:
        nodes: ${REDIS_NODES:localhost:6379}
        max-redirects: 6
      lettuce:
        cluster:
          refresh:
            adaptive: true
            period: 10s

server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        leaderboard.top.duration: true
        leaderboard.rank.duration: true
        leaderboard.neighbors.duration: true

leaderboard:
  partitions: ${LEADERBOARD_PARTITIONS:4}
  broadcast-interval-ms: ${LEADERBOARD_BROADCAST_INTERVAL_MS:1000}

jwt:
  secret: ${JWT_SECRET:dev-secret-please-change-min-32-bytes-1234567890}
  ttl: ${JWT_TTL:PT1H}
  issuer: leaderboard-app

app:
  instance: ${APP_INSTANCE:local}

logging:
  level:
    org.springframework.web: INFO
    org.springframework.security: INFO
    com.realtimegaming.leaderboard: DEBUG
